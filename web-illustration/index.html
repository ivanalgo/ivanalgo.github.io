<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Illustration Lab</title>
    <style>
      *{box-sizing:border-box}body{margin:0;min-height:100vh;color:#202123;background:#f5f5f2;font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}
      main{width:min(1050px,calc(100% - 36px));margin:auto;padding:80px 0}.eyebrow{color:#08785e;font-size:11px;font-weight:800;letter-spacing:.16em}
      h1{margin:14px 0 44px;font-size:clamp(44px,7vw,72px);letter-spacing:-.055em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
      a{padding:28px;color:inherit;text-decoration:none;border:1px solid #deded9;border-radius:22px;background:white;box-shadow:0 15px 45px rgba(0,0,0,.05)}
      a:hover{border-color:#10a37f;transform:translateY(-2px)}a span{color:#08785e;font:10px ui-monospace}h2{margin:14px 0 9px}p{margin:0;color:#777;line-height:1.65}
      @media(max-width:700px){.grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">WEB ILLUSTRATION LAB</div>
      <h1>选择一个系统，<br />把内部过程展开。</h1>
      <div class="grid">
        <a href="./mlp/"><span>MACHINE LEARNING</span><h2>MLP 训练解剖室 →</h2><p>Forward、Loss、Backward 与参数更新逐步可视化。</p></a>
        <a href="./x86-pipeline/"><span>CPU MICROARCHITECTURE</span><h2>x86 Pipeline Lab →</h2><p>乱序执行、物理寄存器、Scheduler、ROB 与分支预测。</p></a>
      </div>
    </main>
  </body>
</html>
