<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="配置一个乱序 x86 CPU 流水线实验" />
    <title>创建实验 · x86 Pipeline Lab</title>
    <link rel="stylesheet" href="./styles.css?v=20260629-10" />
  </head>
  <body class="setup-page">
    <div class="shell">
      <header class="topbar">
        <a href="../" class="brand"><b>μARCH</b><span>Web Illustration</span></a>
        <span class="status"><i></i> OUT-OF-ORDER PIPELINE LAB</span>
      </header>

      <main class="setup-main">
        <div class="setup-heading">
          <span class="eyebrow">CREATE AN EXPERIMENT</span>
          <h1>配置乱序核心</h1>
          <p>选择核心参数并输入一段简化 x86 汇编，生成后进入独立的逐周期演示页面。</p>
        </div>

        <section class="control-card setup-card">
          <div class="control-grid">
            <label>微架构
              <select id="modeSelect" disabled>
                <option value="ooo">乱序九级 · OOO</option>
              </select>
            </label>
            <label>示例程序
              <select id="presetSelect">
                <option value="dependency">数据依赖与并行</option>
                <option value="branch">分支预测与冲刷</option>
                <option value="memory">Load / Store</option>
              </select>
            </label>
            <label>发射宽度
              <select id="widthSelect">
                <option value="1">1-wide</option>
                <option value="2" selected>2-wide</option>
                <option value="4">4-wide</option>
              </select>
            </label>
            <label>分支预测器
              <select id="predictorSelect">
                <option value="two-bit">2-bit 饱和计数器</option>
                <option value="static">静态 Not-taken</option>
              </select>
            </label>
          </div>

          <div class="editor-row">
            <div>
              <div class="mini-title">简化 x86 汇编</div>
              <textarea id="programEditor" spellcheck="false"></textarea>
            </div>
            <div class="instruction-help">
              <span>支持指令</span>
              <code>MOV ADD SUB IMUL</code>
              <code>AND OR XOR CMP</code>
              <code>JMP JZ JNZ NOP</code>
              <small>寄存器：RAX–RDI、R8、R9<br />内存：[100] · 注释：;</small>
            </div>
          </div>

          <div class="setup-action">
            <span id="parseError" class="error"></span>
            <button id="generateButton" class="button primary generate-button">生成流水线实验 →</button>
          </div>
        </section>
      </main>

      <footer>Educational x86-like model · 机制正确优先，不对应某一款商业 CPU</footer>
    </div>
    <script src="./simulator.js?v=20260629-10"></script>
    <script src="./setup.js?v=20260629-10"></script>
  </body>
</html>
