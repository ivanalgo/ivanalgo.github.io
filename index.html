<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Ivan 的交互实验、英语学习与技术图解索引" />
    <title>Ivan's Web Labs</title>
    <style>
      :root {
        --ink: #202123;
        --muted: #71736e;
        --line: #deded9;
        --paper: #f6f6f3;
        --green: #10a37f;
        --purple: #7659c7;
        --blue: #3976d9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 0, #e3f6ef 0, transparent 30%),
          var(--paper);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      }
      main {
        width: min(1080px, calc(100% - 36px));
        margin: auto;
        padding: 74px 0 90px;
      }
      .eyebrow {
        color: #08785e;
        font: 800 11px ui-monospace, monospace;
        letter-spacing: .16em;
      }
      h1 {
        max-width: 760px;
        margin: 16px 0 14px;
        font-size: clamp(45px, 7vw, 76px);
        line-height: .98;
        letter-spacing: -.055em;
      }
      .intro {
        max-width: 610px;
        margin: 0 0 46px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.75;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .card {
        position: relative;
        min-height: 245px;
        padding: 25px;
        overflow: hidden;
        color: inherit;
        text-decoration: none;
        border: 1px solid var(--line);
        border-top: 4px solid var(--accent);
        border-radius: 5px 5px 22px 22px;
        background: rgba(255, 255, 255, .94);
        box-shadow: 0 16px 48px rgba(31, 35, 33, .06);
        transition: transform .18s ease, box-shadow .18s ease;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 23px 60px rgba(31, 35, 33, .12);
      }
      .card small {
        color: var(--accent);
        font: 800 9px ui-monospace, monospace;
        letter-spacing: .12em;
      }
      .card h2 {
        margin: 20px 0 11px;
        font-size: 23px;
        letter-spacing: -.025em;
      }
      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }
      .arrow {
        position: absolute;
        right: 23px;
        bottom: 21px;
        color: var(--accent);
        font-size: 24px;
      }
      footer {
        margin-top: 34px;
        color: #969792;
        font-size: 10px;
      }
      @media (max-width: 780px) {
        main { padding-top: 50px; }
        .grid { grid-template-columns: 1fr; }
        .card { min-height: 190px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">IVAN'S WEB LABS</div>
      <h1>学习、实验，<br />把过程展开。</h1>
      <p class="intro">这里汇集英语学习工具与可交互的计算机技术图解。选择一个入口，进入对应的独立实验页面。</p>

      <nav class="grid" aria-label="站点目录">
        <a class="card" style="--accent:var(--green)" href="./english-reading-lab/">
          <small>ENGLISH READING</small>
          <h2>英语阅读实验室</h2>
          <p>按 CEFR 等级组织阅读材料，逐步扩展英语阅读与理解能力。</p>
          <span class="arrow">→</span>
        </a>
        <a class="card" style="--accent:var(--purple)" href="./news-english-vocab/">
          <small>VOCABULARY</small>
          <h2>新闻英语词汇</h2>
          <p>围绕新闻语境学习、整理与复习英语词汇。</p>
          <span class="arrow">→</span>
        </a>
        <a class="card" style="--accent:var(--blue)" href="./web-illustration/">
          <small>WEB ILLUSTRATION</small>
          <h2>交互式技术图解</h2>
          <p>逐步观察 MLP 训练以及 x86 乱序处理器内部的数据流动。</p>
          <span class="arrow">→</span>
        </a>
      </nav>

      <footer>ivanalgo.github.io · Three independent web labs</footer>
    </main>
  </body>
</html>
